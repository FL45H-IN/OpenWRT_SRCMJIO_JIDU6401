name: Build OpenWrt for Sercomm 6401

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc g++ make libncurses-dev zlib1g-dev gawk gettext libssl-dev xsltproc zip file subversion jq tar bzip2 unzip wget git rsync python3 python3-setuptools

      - name: Clone OpenWrt (Master)
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          
          # Switch from git.openwrt.org to GitHub mirrors
          sed -i 's/git\.openwrt\.org\/feed\/packages\.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/git\.openwrt\.org\/project\/luci\.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
          sed -i 's/git\.openwrt\.org\/feed\/routing\.git/github.com\/openwrt\/routing.git/g' feeds.conf.default
          sed -i 's/git\.openwrt\.org\/feed\/telephony\.git/github.com\/openwrt\/telephony.git/g' feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Target and Essential Packages
        run: |
          cd openwrt
          
          # Target Configuration (MT7986A RFB / Sercomm 6401)
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_mediatek_mt7986a-rfb=y" >> .config
          
          # Web Interface
          echo "CONFIG_PACKAGE_luci=y" >> .config
          
          # Hardware Offloading & Performance
          echo "CONFIG_PACKAGE_kmod-nft-offload=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt7986-firmware=y" >> .config
          
          # Network Segmentation & ODU Communication
          echo "CONFIG_PACKAGE_kmod-8021q=y" >> .config
          echo "CONFIG_PACKAGE_kmod-macvlan=y" >> .config
          
          # Traffic Manipulation (Prep for DPI Bypass tools like Zapret/ByeDPI)
          echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-queue=y" >> .config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
          
          # DNS over HTTPS
          echo "CONFIG_PACKAGE_https-dns-proxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-https-dns-proxy=y" >> .config

          make defconfig

      - name: Download Package Sources
        run: |
          cd openwrt
          make download -j8

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload Images
        uses: actions/upload-artifact@v4
        with:
          name: Sercomm-6401-Firmware
          path: openwrt/bin/targets/mediatek/filogic/*
